name: Native Keepalive

on:
  schedule:
    - cron: "0 0 * * 1" # 每周一运行一次即可，不需要每天运行
  workflow_dispatch: # 方便你现在手动测试

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须给写入权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keepalive file
        run: |
          date > keepalive.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keepalive.txt
          git commit -m "chore: keepalive update $(date)" || echo "No changes to commit"
          git push
