name: Native Keepalive

on:
  schedule:
    - cron: "0 0 1,15 * *"  # 每月 1 号和 15 号凌晨 0:00 运行
  workflow_dispatch: 

# 添加这一段来消除 Node.js 20 的警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keepalive file
        run: |
          # 确保仓库里有一个名为 keepalive.txt 的文件
          date > keepalive.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keepalive.txt
          git commit -m "chore: keepalive update $(date)" || echo "No changes to commit"
          git push
