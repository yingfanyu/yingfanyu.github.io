name: Keepalive Workflow

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0 点运行
  workflow_dispatch: # 允许你手动点击按钮测试

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v1
        with:
          gh_token: ${{ secrets.KEEPALIVE_TOKEN }}
